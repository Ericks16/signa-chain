name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "24"
  PNPM_VERSION: "11.9.0"

jobs:
  # ── Lint + Typecheck ───────────────────────────────────────────────────── #
  quality:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck all packages
        run: pnpm typecheck

      - name: Lint all packages
        run: pnpm lint

  # ── vc-sdk unit tests ─────────────────────────────────────────────────── #
  test-sdk:
    name: vc-sdk Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run vc-sdk tests
        run: pnpm --filter @signa-chain/vc-sdk test

  # ── Smart contract tests ──────────────────────────────────────────────── #
  test-contracts:
    name: Contract Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Compile contracts
        run: pnpm --filter @signa-chain/contracts build

      - name: Run contract tests
        run: pnpm --filter @signa-chain/contracts test

  # ── API e2e tests ──────────────────────────────────────────────────────── #
  test-api:
    name: API e2e Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: signachain
          POSTGRES_PASSWORD: password
          POSTGRES_DB: signachain_dev
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U signachain -d signachain_dev"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run API e2e tests
        run: pnpm --filter @signa-chain/api run test:e2e

  # ── Build check ───────────────────────────────────────────────────────── #
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [quality, test-sdk, test-contracts, test-api]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages/types
        run: pnpm --filter @signa-chain/types build

      - name: Build vc-sdk
        run: pnpm --filter @signa-chain/vc-sdk build

      - name: Build API
        run: pnpm --filter @signa-chain/api build

      - name: Build Web
        run: pnpm --filter @signa-chain/web build
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL || 'http://localhost:4000' }}
